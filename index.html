<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f8f9fa;--bg-tertiary:#f0f1f3;
  --text-primary:#111827;--text-secondary:#6b7280;--text-tertiary:#9ca3af;
  --border:#e5e7eb;--border-strong:#d1d5db;
  --accent:#10b981;--accent-light:#d1fae5;--accent-dark:#065f46;
  --radius:10px;--radius-lg:16px;
  --sidebar-w:250px;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:13px;color:var(--text-primary)}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);background:#fff;outline:none;transition:border .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.12)}
textarea{resize:vertical;min-height:80px;line-height:1.6}

/* ── Login ── */
.login-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#064e3b 0%,#065f46 30%,#047857 60%,#059669 100%);backdrop-filter:blur(20px)}
.login-card{background:#fff;border-radius:20px;padding:48px 40px;width:380px;max-width:90vw;box-shadow:0 25px 60px rgba(0,0,0,.25);text-align:center}
.login-card h1{font-size:22px;font-weight:800;color:#111;margin:16px 0 4px}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:28px}
.login-card .logo-circle{width:56px;height:56px;background:var(--accent);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:4px}
.login-card .logo-circle i{color:#fff;font-size:26px}
.login-input{position:relative;margin-bottom:16px;text-align:left}
.login-input label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.login-input input{padding:10px 14px;font-size:14px;border-radius:12px}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.login-btn:hover{background:#059669}
.login-error{color:#ef4444;font-size:12px;margin-top:10px;min-height:18px;font-weight:600}

/* ── App Shell ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-header .logo{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-header .logo i{color:#fff;font-size:17px}
.sidebar-header .title{font-size:14px;font-weight:700}
.sidebar-header .sub{font-size:10px;color:var(--text-tertiary);margin-top:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-label{padding:16px 18px 4px;font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-left:2.5px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:var(--bg-secondary);color:var(--text-primary)}
.nav-item.active{color:var(--accent-dark);border-left-color:var(--accent);background:var(--accent-light);font-weight:600}
.nav-item i,.nav-item span.icon{font-size:16px;flex-shrink:0;width:18px;text-align:center}
.nav-group-toggle{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:13px;color:var(--text-secondary);cursor:pointer;user-select:none;transition:background .12s}
.nav-group-toggle:hover{background:var(--bg-secondary)}
.nav-group-toggle .chevron{font-size:12px;transition:transform .2s;margin-left:auto}
.nav-group-toggle.open .chevron{transform:rotate(90deg)}
.nav-group-items{overflow:hidden;max-height:0;transition:max-height .25s ease}
.nav-group-items.open{max-height:600px}
.nav-group-items .nav-item{padding-left:36px;font-size:12px}
.admin-only{display:none}
body.is-admin .admin-only{display:flex}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-tertiary)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;flex-wrap:nowrap;overflow:hidden;position:relative}
.topbar .clock-bar{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.breadcrumb{font-size:12px;color:var(--text-tertiary);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.breadcrumb b{color:var(--text-primary);font-weight:700}
.clock-bar{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--bg-secondary);border:1px solid var(--border);padding:6px 14px;border-radius:12px}
.clock-bar .sep{width:1px;height:14px;background:var(--border);margin:0 6px}
.content{flex:1;overflow-y:auto;padding:24px;min-height:0}
.page{display:none}
.page.active{display:block}

/* ── Cards ── */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--text-primary)}

/* ── KPI Cards ── */
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:box-shadow .15s,transform .15s}
.kpi-card:hover{box-shadow:0 6px 16px rgba(0,0,0,.07);transform:translateY(-1px)}
.kpi-label{font-size:11px;font-weight:700;color:var(--text-tertiary);letter-spacing:.2px}
.kpi-value{font-size:26px;font-weight:900;color:var(--text-primary);margin:6px 0 4px;letter-spacing:-.5px}
.kpi-change{font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:6px}
.kpi-change.change-up{color:#dc2626;background:#fef2f2}
.kpi-change.change-down{color:#2563eb;background:#eff6ff}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;font-weight:600;border:1px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;background:#fff;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg-secondary)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#059669}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-ghost{border:none;background:transparent;color:var(--accent-dark)}
.btn-ghost:hover{background:var(--accent-light)}

/* ── Doc Viewer ── */
.doc-viewer{display:flex;flex-direction:column;height:calc(100vh - 61px);margin:-24px;background:#fff}
.doc-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.doc-toolbar .title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.doc-iframe-wrap{flex:1;position:relative;overflow:hidden}
.doc-iframe-wrap iframe{width:100%;height:100%;border:none}
.doc-iframe-wrap .read-overlay{position:absolute;top:0;left:0;right:0;bottom:40px;z-index:10;cursor:default}

/* ── Misc ── */
.row-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.link-card{display:flex;align-items:center;gap:10px;padding:13px 16px;background:#fff;border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text-primary);font-size:13px;font-weight:600;transition:all .15s}
.link-card:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(16,185,129,.12);transform:translateY(-2px)}
.link-card i{font-size:18px;flex-shrink:0;opacity:.8}
.link-card:hover i{opacity:1}
.link-card.featured{background:var(--accent-light);border-color:var(--accent);font-weight:700}
.detail-box{margin-top:8px;background:var(--bg-secondary);padding:10px 12px;border-radius:8px;font-size:12px;white-space:pre-wrap;color:var(--text-secondary);line-height:1.6;max-height:200px;overflow-y:auto}
.preview-btns{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.preview-frame{display:none;margin-top:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;height:420px}
.preview-frame iframe{width:100%;height:100%;border:none}
.tag-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--accent-dark);margin-top:4px;text-decoration:none}
.apple-region-box{background:var(--bg-secondary);border-radius:12px;padding:14px;transition:background .2s}
.apple-region-box .region-label{font-size:11px;font-weight:700;color:var(--text-tertiary);margin-bottom:6px}
.apple-region-box.approved{background:var(--accent-light)}
.apple-region-box.approved .region-label{color:var(--accent-dark)}
.ai-panel{display:flex;flex-direction:column;height:calc(100vh - 61px - 48px);background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin:-24px;margin-top:0}
.ai-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-ai{background:var(--bg-secondary);padding:12px 16px;border-radius:12px;font-size:13px;max-width:80%;align-self:flex-start;line-height:1.6}
.msg-user{background:var(--accent);color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;max-width:80%;align-self:flex-end}
.ai-foot{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.ai-foot input{flex:1}
.user-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-secondary);padding:4px 10px;border-radius:8px;background:var(--bg-secondary);cursor:pointer}
.user-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.mobile-menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;color:var(--text-secondary)}
.mobile-menu{display:none;position:fixed;inset:0;z-index:200;background:#fff;flex-direction:column;overflow-y:auto}
.mobile-menu.open{display:flex}
.mobile-menu-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mobile-menu-header .title{font-size:16px;font-weight:700}
.mobile-menu-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-secondary);padding:4px}
.mobile-menu .mobile-nav{flex:1;padding:8px 0}
.mobile-menu .mobile-nav-label{padding:12px 20px 4px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase}
.mobile-menu .mobile-nav-item{display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:15px;font-weight:500;color:var(--text-primary);cursor:pointer;border-bottom:1px solid #f3f4f6}
.mobile-menu .mobile-nav-item:active{background:var(--bg-secondary)}
.mobile-menu .mobile-nav-item i{font-size:18px;width:24px;text-align:center;color:var(--text-tertiary)}
.mobile-menu-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:13px;color:var(--text-tertiary)}
@media(max-width:768px){
  .sidebar{display:none}
  .mobile-menu-btn{display:block}
  .topbar{padding:10px 14px}
  .topbar .breadcrumb{font-size:13px;font-weight:600}
  .content{padding:14px}
  .clock-bar{display:none}
  .card{padding:14px}
  .login-card{padding:32px 24px;width:320px}
  .doc-viewer{margin:0}
}
</style>
</head>

/* ── User DB (Google Sheets API) ── */
var USER_API_URL = 'https://script.google.com/macros/s/AKfycbwj3k6xaBQKUXiZLesgBE9IxzM-5eG3bDvYNr8BybKn9l0KnMV9CqMeitrkE6U7uPbzNA/exec';
var _memUsers=null;
function getUserDB(){
  if(_memUsers) return _memUsers;
  _memUsers=[];return _memUsers;
}
function saveUserDB(users){_memUsers=users;}
function apiGet(params,callback){
  fetch(USER_API_URL+'?'+params+'&t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){if(callback)callback(d);})
    .catch(function(e){console.error('API 오류:',e);});
}
function fetchUsersFromAPI(callback){
  apiGet('action=list',function(d){
    if(d.ok){_memUsers=d.users;if(callback)callback(d.users);}
  });
}
function toB64(str){try{return btoa(unescape(encodeURIComponent(str||'')));}catch(e){return btoa(str||'');}}
function apiCall(body,callback){
  var params='action='+encodeURIComponent(body.action);
  Object.keys(body).forEach(function(k){
    if(k==='action')return;
    var v=body[k]||'';
    if(k==='name')v=toB64(v);
    params+='&'+encodeURIComponent(k)+'='+encodeURIComponent(v);
  });
  apiGet(params,callback);
}
function seedAdmin(){}

/* ── Google Sign-In callback ── */
function decodeJwt(token){try{var b=token.split('.')[1];return JSON.parse(atob(b.replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}

function onGoogleLogin(response){
  var errEl=document.getElementById('login-error');
  errEl.style.color='';errEl.textContent='';
  var payload=decodeJwt(response.credential);
  if(!payload||!payload.email){errEl.textContent='Google 인증 실패';return;}
  var email=payload.email.toLowerCase();
  var name=payload.name||email;
  var picture=payload.picture||'';
  errEl.style.color='#6b7280';errEl.textContent='확인 중...';
  apiGet('action=check&email='+encodeURIComponent(email),function(d){
    if(!d.ok){errEl.style.color='#ef4444';errEl.textContent='서버 오류';return;}
    var u=d.user;
    if(!u){
      apiCall({action:'register',email:email,name:name,picture:picture},function(res){
        errEl.style.color='#f59e0b';
        errEl.textContent='가입 요청 완료! 관리자 승인 후 이용 가능합니다.';
      });
      return;
    }
    if(u.status!=='approved'){errEl.style.color='#f59e0b';errEl.textContent='관리자 승인 대기 중입니다.';return;}
    loginSuccess(u.role,u.name||name,u.picture||picture,email);
  });
}

/* ── Session ── */
var _sessionAuth=null;
function loginSuccess(role,name,picture,email){
  isAdmin=(role==='admin');
  _sessionAuth={role:role,name:name||'',picture:picture||'',email:email||'',ts:Date.now()};
  try{sessionStorage.setItem('portal_auth',JSON.stringify(_sessionAuth));}catch(e){}
  if(isAdmin) document.body.classList.add('is-admin');
  var roleLabel=document.getElementById('user-role-label');
  if(roleLabel) roleLabel.textContent=(name||'')+(isAdmin?' (관리자)':' (뷰어)');
  var roleLabelM=document.getElementById('user-role-label-m');
  if(roleLabelM) roleLabelM.textContent=(name||'')+(isAdmin?' (관리자)':' (뷰어)');
  var device=/Mobi|Android/i.test(navigator.userAgent)?'mobile':'desktop';
  apiCall({action:'log',email:email||'',name:name||'',device:device,page:'login'},function(){});
  function sendHeartbeat(){apiCall({action:'heartbeat',email:_sessionAuth.email||'',name:_sessionAuth.name||'',device:device},function(){});}
  sendHeartbeat();
  setInterval(sendHeartbeat,60000);
  window._sendHeartbeat=sendHeartbeat;
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('main-app').style.display='flex';
  initApp();
}
function toggleMobileMenu(){

}
function closeMobileMenu(){
  document.getElementById('mobile-menu').classList.remove('open');
}
function buildMobileNav(){
  var html='';
  SIDEBAR_MENU.forEach(function(item){
    if(item.section){
      if(item.adminOnly&&!isAdmin)return;
      html+='<div class="mobile-nav-label">'+item.section+'</div>';
      if(item.items){
        item.items.forEach(function(sub){
          if(sub.adminOnly&&!isAdmin)return;
          html+='<div class="mobile-nav-item" onclick="nav(\''+sub.id+'\');closeMobileMenu()"><i class="ti '+sub.icon+'"></i>'+sub.label+'</div>';
        });
      }
    }else{
      if(item.adminOnly&&!isAdmin)return;
      if(item.external){
        html+='<div class="mobile-nav-item" onclick="window.open(\''+item.external+'\',\'_blank\');closeMobileMenu()"><i class="ti '+item.icon+'"></i>'+item.label+'</div>';
      } else {
        html+='<div class="mobile-nav-item" onclick="nav(\''+item.id+'\');closeMobileMenu()"><i class="ti '+item.icon+'"></i>'+item.label+'</div>';
      }
    }
  });
  var mNav=document.getElementById('mobile-nav');
  if(mNav)mNav.innerHTML=html;
}
function doLogout(){_sessionAuth=null;try{sessionStorage.removeItem('portal_auth');}catch(e){}location.reload();}
function checkSession(){
  if(_sessionAuth&&_sessionAuth.role){loginSuccess(_sessionAuth.role,_sessionAuth.name,_sessionAuth.picture,_sessionAuth.email);return true;}
  try{var s=JSON.parse(sessionStorage.getItem('portal_auth'));if(s&&s.role&&(Date.now()-s.ts)<86400000){loginSuccess(s.role,s.name,s.picture,s.email);return true;}}catch(e){}
  return false;
}

   SIDEBAR BUILD

function buildSidebar(){
  var html='';
  SIDEBAR_MENU.forEach(function(item){
    if(item.section){
      if(item.group){
        html+='<div class="nav-label'+(item.adminOnly?' admin-only':'')+'">'+item.section+'</div>';
        html+='<div class="nav-group-toggle'+(item.adminOnly?' admin-only':'')+'" onclick="toggleGroup(this)"><i class="ti ti-folder" style="font-size:16px;width:18px;text-align:center"></i> <span style="flex:1;font-weight:600">'+item.section+'</span><i class="ti ti-chevron-right chevron"></i></div>';
        html+='<div class="nav-group-items">';
        (item.items||[]).forEach(function(sub){
          html+='<div class="nav-item" data-page="'+sub.id+'" onclick="nav(\''+sub.id+'\',this)"><i class="ti '+sub.icon+'"></i> '+sub.label+'</div>';
        });
        html+='</div>';
      } else {
        html+='<div class="nav-label'+(item.adminOnly?' admin-only':'')+'">'+item.section+'</div>';
      }
    } else if(item.external){
      html+='<div class="nav-item'+(item.adminOnly?' admin-only':'')+'" onclick="window.open(\''+item.external+'\',\'_blank\')"><i class="ti '+item.icon+'"></i> '+item.label+' <i class="ti ti-external-link" style="margin-left:auto;font-size:12px;opacity:.5"></i></div>';
    } else {
      html+='<div class="nav-item'+(item.id==='dashboard'?' active':'')+''+(item.adminOnly?' admin-only':'')+'" data-page="'+item.id+'" onclick="nav(\''+item.id+'\',this)"><i class="ti '+item.icon+'"></i> '+item.label+'</div>';
    }
  });
  document.getElementById('sidebar-nav').innerHTML=html;
}
function toggleGroup(el){
  el.classList.toggle('open');
  var items=el.nextElementSibling;
  if(items) items.classList.toggle('open');
}

function nav(id,el){
  closeMobileMenu();
  currentPage=id;
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  if(el)el.classList.add('active');
  else{var n=document.querySelector('[data-page="'+id+'"]');if(n)n.classList.add('active');}
  document.getElementById('bc-text').textContent=pageNames[id]||LINK_HUB[parseInt((id||'').replace('links-',''))]&&LINK_HUB[parseInt(id.replace('links-',''))].title||id;
  renderPage(id);

function renderPage(id){
  var c=document.getElementById('content-area');
  // Link hub pages
  if(id.indexOf('links-')===0){
    var idx=parseInt(id.replace('links-',''));
    var hub=LINK_HUB[idx]; if(!hub){c.innerHTML='';return;}
    c.innerHTML='<div class="card"><div class="card-header"><span class="card-title"><i class="ti '+(SIDEBAR_MENU.find(function(m){return m.group}).items[idx]||{}).icon+' text-lg"></i> '+hub.title+'</span></div><div class="link-grid">'+hub.links.map(function(lk){return'<a href="'+lk.url+'" target="_blank" class="link-card'+(lk.featured?' featured':'')+'"><i class="ti '+lk.icon+'"></i>'+lk.label+'</a>';}).join('')+'</div></div>';
    return;
  }
  // Doc viewer pages
  if(DOC_URLS[id]){
    var doc=DOC_URLS[id];
    if(doc.placeholder){
      c.innerHTML='<div class="doc-viewer"><div class="doc-toolbar"><span class="title"><i class="ti ti-table text-gray-400"></i> '+(pageNames[id]||id)+'</span><a href="'+doc.edit+'" target="_blank" class="btn btn-primary btn-sm"><i class="ti ti-external-link"></i> Google Drive에서 열기</a></div><div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><i class="ti ti-folder-open" style="font-size:48px;color:#d1d5db"></i><p style="font-size:13px;color:#9ca3af">폴더를 새 창에서 확인하세요</p></div></div>';
      return;
    }
    var extraBtns='';
    if(doc.extra) extraBtns=doc.extra.map(function(e){return'<a href="'+e.url+'" target="_blank" class="btn btn-sm"><i class="ti '+e.icon+'"></i> '+e.label+'</a>';}).join('');
    c.innerHTML='<div class="doc-viewer"><div class="doc-toolbar"><span class="title"><i class="ti ti-file-spreadsheet text-emerald-600"></i> '+(pageNames[id]||id)+' <span style="font-size:11px;color:#9ca3af;font-weight:400;margin-left:8px">읽기 전용</span></span><div style="display:flex;gap:6px">'+extraBtns+'<a href="'+doc.edit+'" target="_blank" class="btn btn-primary btn-sm"><i class="ti ti-pencil"></i> 새창에서 편집</a></div></div><div class="doc-iframe-wrap"><iframe src="'+(doc.preview||doc.edit)+'"></iframe></div></div>';
    return;
  }
  // Custom pages
  var renderers={
    dashboard:renderDashboard,
    'live-schedule':renderSchedule,
    platform:renderPlatform,
    settlement:renderSettlement,
    weekly:function(){renderArchive('weekly');},
    report:function(){renderArchive('report');},
    internal:function(){renderArchive('internal');},
    kpi:renderKpiPage,
    devmeeting:renderDevMeeting,
    'screenshot-spec':renderSpecs,
    ai:renderAI,
    'admin-settings':renderAdmin,
    milestone:renderMilestonePage,
    competitor:renderCompetitor
  };
  if(renderers[id]) renderers[id]();
  else c.innerHTML='<div class="card"><p style="color:#999;padding:20px;text-align:center">페이지 준비 중</p></div>';
}

function saveMeeting(){
  var type=_mtCurrentType;
  var params={
    action:'meetings_save', type:type,
    id:editTarget.id||'',
    title:document.getElementById('mt-title').value.trim(),
    date:document.getElementById('mt-date').value,
    attendees:document.getElementById('mt-attendees').value.trim(),
    summary:document.getElementById('mt-summary').value.trim(),
    details:document.getElementById('mt-details').value.trim(),
    imageUrl:document.getElementById('mt-imageUrl').value.trim(),
    author:_sessionAuth?_sessionAuth.email:''
  };
  if(!params.title){alert('제목을 입력해주세요.');return;}
  if(!params.date){alert('날짜를 선택해주세요.');return;}
  closeMeetingForm();
  var listEl=document.getElementById('mt-list');
  if(listEl)listEl.innerHTML='<div class="text-center py-6 text-gray-400 text-sm">저장 중...</div>';
  apiPostMeeting(params).then(function(){
    fetchMeetings(type,function(list){
      _meetingCache[type]=list;
      renderArchive(type);
    });
  }).catch(function(e){alert('저장 실패: '+e.message);});
}
function deleteMeetingRow(id, type){
  if(!confirm('삭제하시겠습니까?'))return;

    fetchMeetings(type,function(list){_meetingCache[type]=list;renderArchive(type);});
  }).catch(function(e){alert('삭제 실패: '+e.message);});
}

function loadOnlineUsers(){
  var el=document.getElementById('online-users');
  if(!el)return;
  fetch(USER_API_URL+'?action=online&t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok||!d.online||!d.online.length){el.innerHTML='<p class="text-sm text-gray-400 py-2 text-center">현재 접속자가 없습니다.</p>';return;}
      var seen={};
      d.online=d.online.filter(function(u){var k=u.email||u.name;if(seen[k])return false;seen[k]=true;return true;});
      var html=d.online.map(function(u){
        var icon=u.device==='mobile'?'ti-device-mobile':'ti-device-desktop';
        return'<div class="flex items-center gap-3 p-2"><span style="width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0"></span><i class="ti '+icon+'" style="color:#9ca3af"></i><span class="text-sm font-bold">'+esc(u.name)+'</span><span class="text-xs text-gray-400">'+esc(u.email)+'</span></div>';
      }).join('');
      el.innerHTML=html;
    })
    .catch(function(e){el.innerHTML='<p class="text-sm text-gray-400 py-2 text-center">접속 현황을 불러올 수 없습니다.</p>';});
}
function loadAccessLogs(){
  apiGet('action=logs',function(d){
    var el=document.getElementById('access-logs');
    if(!el)return;
    if(!d.ok||!d.logs||!d.logs.length){el.innerHTML='<p class="text-sm text-gray-400 py-2 text-center">접속 기록이 없습니다.</p>';return;}
    var byDate={};
    d.logs.forEach(function(l){
      var day=l.time?(new Date(l.time).toLocaleDateString('ko-KR',{timeZone:'Asia/Seoul'})):'알 수 없음';
      var key=l.email+'|'+day;
      if(!byDate[key])byDate[key]={name:l.name,email:l.email,date:day,device:l.device,count:0};
      byDate[key].count++;
    });
    var rows=Object.values(byDate);
    var html='<table style="width:100%;font-size:12px;border-collapse:collapse"><tr style="border-bottom:1px solid #e5e7eb"><th style="text-align:left;padding:6px;color:#9ca3af">날짜</th><th style="text-align:left;padding:6px;color:#9ca3af">이름</th><th style="text-align:left;padding:6px;color:#9ca3af">이메일</th><th style="text-align:left;padding:6px;color:#9ca3af">기기</th><th style="text-align:left;padding:6px;color:#9ca3af">접속 횟수</th></tr>';
    rows.forEach(function(r){
      html+='<tr style="border-bottom:1px solid #f3f4f6"><td style="padding:6px;color:#6b7280">'+esc(r.date)+'</td><td style="padding:6px">'+esc(r.name)+'</td><td style="padding:6px;color:#6b7280">'+esc(r.email)+'</td><td style="padding:6px">'+esc(r.device||'')+'</td><td style="padding:6px">'+r.count+'회</td></tr>';
    });
    html+='</table>';
    el.innerHTML=html;
  });
}
function approveUser(email){apiCall({action:'update',email:email,status:'approved'},function(){renderAdmin();});}
function rejectUser(email,name){if(confirm((name||email)+' 사용자를 차단/거부하시겠습니까?')){apiCall({action:'update',email:email,status:'rejected'},function(){renderAdmin();});}}
function changeRole(email,newRole){apiCall({action:'update',email:email,role:newRole},function(){renderAdmin();});}
function deleteUser(email,name){if(confirm((name||email)+' 사용자를 완전히 삭제하시겠습니까?')){apiCall({action:'delete',email:email},function(){renderAdmin();});}}
function addViewer(){
  var email=(document.getElementById('add-viewer-email').value||'').trim().toLowerCase();
  var name=(document.getElementById('add-viewer-name').value||'').trim();
  if(!email){alert('이메일을 입력하세요.');return;}
  apiCall({action:'add',email:email,name:name||email,role:'viewer'},function(d){
    if(!d.ok&&d.msg==='already_exists'){alert('이미 등록된 이메일입니다.');return;}
    document.getElementById('add-viewer-email').value='';
    document.getElementById('add-viewer-name').value='';
    renderAdmin();
  });
}

  },1000);
}

function fmtNum(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억';if(n>=10000)return(n/10000).toFixed(1)+'만';return n.toLocaleString();}
function parseChange(s){var str=String(s||'');var isDown=str.indexOf('▼')!==-1||str.indexOf('-')!==-1;var num=str.replace(/[▲▼\s]/g,'');return{text:(isDown?'▼':'▲')+num,dir:isDown?'down':'up'};}

function fetchKpiData(){
  if(!KPI_API_URL) return;
  var cacheKey='kpi_cache';
  var today=new Date().toISOString().slice(0,10);
  var hour=new Date().getHours();
  try{
    var cached=JSON.parse(localStorage.getItem(cacheKey)||'null');
    if(cached&&cached.date===today){
      var cachedAt=cached.hour*60+(cached.minute||0);
      var nowAt=hour*60+new Date().getMinutes();
      var past8=hour>=8;var cachedBefore8=cached.hour<8;
      if(!(past8&&cachedBefore8)&&(nowAt-cachedAt)<60){
        applyKpiData(cached.data);return;
      }
    }
  }catch(e){}
  fetch(KPI_API_URL).then(function(r){return r.json();}).then(function(data){
    if(data&&data.success){
      try{localStorage.setItem(cacheKey,JSON.stringify({date:today,hour:hour,minute:new Date().getMinutes(),data:data}));}catch(e){}
      applyKpiData(data);
    }
  }).catch(function(){});
}

function applyKpiData(d){
  if(!d)return;
  var w=d.weekly||{};var c=w.change||{};
  if(w.dau){
    KPI_DATA=[
      {label:'일평균 DAU',value:fmtNum(w.dau),change:parseChange(c.dau).text,dir:parseChange(c.dau).dir,color:'#10b981',trend:[]},
      {label:'누적 NRU',value:fmtNum(w.nru),change:parseChange(c.nru).text,dir:parseChange(c.nru).dir,color:'#ef4444',trend:[],alert:parseChange(c.nru).dir==='up'&&parseFloat(String(c.nru||'').replace(/[^0-9.]/g,''))>50},
      {label:'주간 WAU',value:fmtNum(w.wau),change:parseChange(c.wau).text,dir:parseChange(c.wau).dir,color:'#3b82f6',trend:[]},
      {label:'주간 매출',value:fmtNum(w.revenue),change:parseChange(c.revenue).text,dir:parseChange(c.revenue).dir,color:'#8b5cf6',trend:[]}
    ];
  }
  var m=d.monthly||{};var mr=d.monthlyReport||{};var mc=mr.change||{};
  var mUpd=[
    {i:0,val:m.dau,change:m.dauChange},
    {i:1,val:m.revenue,change:m.revenueChange},
    {i:2,val:mr.mau,change:mc.mau},
    {i:3,val:mr.dau,change:mc.dau},
    {i:4,val:mr.pu,change:mc.pu,suffix:'명'},
    {i:5,val:mr.arppu,change:mc.arppu}
  ];
  mUpd.forEach(function(u){
    if(u.val){
      KPI_MONTHLY[u.i]=Object.assign({},KPI_MONTHLY[u.i],{value:fmtNum(u.val)+(u.suffix||''),change:parseChange(u.change).text,dir:parseChange(u.change).dir});
    }
  });
  // 전권역 데이터 캐시
  if(d.regions) window._regionsCache=d.regions;

  // 마일스톤 동기화
  if(d.milestone&&d.milestone.date){
    var ms=d.milestone;
    window._milestoneTimeline=ms.timeline||[];
    function buildList(items,clr){
      if(!items||!items.length) return'<li class="text-gray-400">내역 없음</li>';
      return items.map(function(s){
        return'<li>'+esc(s).replace(/(신규|오픈|업데이트|전직|이벤트|5주년|점령전|알케미스트|스카디|새크리파이스)/g,'<b class="text-indigo-600">$1</b>')+'</li>';
      }).join('');
    }
    function card(title,clr,items){return'<div class="bg-white p-3 rounded-xl border shadow-sm"><div class="font-bold text-xs text-'+clr+'-600 mb-1.5 border-b border-gray-100 pb-1">'+title+'</div><ul class="text-[11px] text-gray-600 space-y-0.5 list-disc list-inside">'+buildList(items)+'</ul></div>';}
    window.dynamicMilestone={
      kr:'<div class="bg-amber-50 border border-amber-200 p-3 rounded-xl mb-3 flex items-center justify-between"><span class="text-xs font-bold text-amber-900">최신 패치</span><span class="text-[11px] bg-amber-200 text-amber-900 px-2 py-0.5 rounded font-bold">'+esc(ms.date)+'</span></div><ul class="space-y-1 text-xs text-gray-700 list-disc list-inside p-3 bg-white rounded-xl border shadow-sm">'+buildList(ms.kr)+'</ul>',
      tw:'<div class="bg-blue-50 border border-blue-200 p-3 rounded-xl mb-3 flex items-center justify-between"><span class="text-xs font-bold text-blue-900">최신 패치</span><span class="text-[11px] bg-blue-200 text-blue-900 px-2 py-0.5 rounded font-bold">'+esc(ms.date)+'</span></div><ul class="space-y-1 text-xs text-gray-700 list-disc list-inside p-3 bg-white rounded-xl border shadow-sm">'+buildList(ms.tw)+'</ul>',
      jp:'<div class="bg-emerald-50 border border-emerald-200 p-3 rounded-xl mb-3 flex items-center justify-between"><span class="text-xs font-bold text-emerald-900">최신 패치</span><span class="text-[11px] bg-emerald-200 text-emerald-900 px-2 py-0.5 rounded font-bold">'+esc(ms.date)+'</span></div><ul class="space-y-1 text-xs text-gray-700 list-disc list-inside p-3 bg-white rounded-xl border shadow-sm">'+buildList(ms.jp)+'</ul>',
      global:'<div class="bg-purple-50 border border-purple-200 p-3 rounded-xl mb-3 flex items-center justify-between"><span class="text-xs font-bold text-purple-900">글로벌 서비스</span><span class="text-[11px] bg-purple-200 text-purple-900 px-2 py-0.5 rounded font-bold">'+esc(ms.date)+'</span></div><ul class="space-y-1 text-xs text-gray-700 list-disc list-inside p-3 bg-white rounded-xl border shadow-sm">'+buildList(ms.gl)+'</ul>',
      cross:'<div class="mb-2.5 flex items-center justify-between border-b border-purple-200 pb-2"><span class="font-bold text-purple-900 text-xs"><i class="ti ti-world text-purple-600"></i> 전 권역 크로스체크</span><span class="text-[11px] bg-purple-100 text-purple-800 font-bold px-2 py-0.5 rounded">'+esc(ms.date)+'</span></div><div class="grid grid-cols-2 gap-2.5">'+card('🇰🇷 한국','red',ms.kr)+card('🇹🇼 대만','blue',ms.tw)+card('🇯🇵 일본','emerald',ms.jp)+card('🌐 글로벌','purple',ms.gl)+'</div>'
    };
    window._milestoneCurrentDate=ms.date;
  }

  // 연간매출 데이터
  if(d.annual){
    var an=d.annual;
    window._annualCache=an;
    // 월간 목표 뱃지 업데이트
    if(an.monthlyTarget&&an.monthlyTarget.plan){
      var mt=an.monthlyTarget;
      var achNum=parseFloat(String(mt.achieve||'').replace(/[^0-9.]/g,''))||0;
      var achColor=achNum>=100?'emerald':achNum>=90?'blue':achNum>=80?'amber':'red';
      window._monthTargetHtml='<div class="flex items-center gap-2 flex-wrap"><span class="text-[11px] text-gray-400">계획 <b class="text-gray-700">'+fmtNum(mt.plan*1000000)+'</b></span><span class="text-[11px] text-gray-400">추정 <b class="text-gray-700">'+fmtNum(mt.estimate*1000000)+'</b></span><span class="text-[11px] font-bold text-'+achColor+'-600 bg-'+achColor+'-50 px-2 py-0.5 rounded-md">달성 '+mt.achieve+'</span></div>';
    }
  }

  // 마이비서 분석 데이터 (서버에서 요약된 섹션)
  if(d.analysis&&d.analysis.insight){
    var a=d.analysis,ins=a.insight;
    function bucket(icon,clr,title,bodyHtml){
      return'<div class="p-3.5 bg-'+clr+'-50/60 border border-'+clr+'-100 rounded-xl"><div class="flex items-center gap-1.5 mb-1.5"><i class="ti '+icon+' text-sm text-'+clr+'-500"></i><span class="font-bold text-xs text-'+clr+'-900">'+title+'</span></div>'+bodyHtml+'</div>';
    }
    function listHtml(items,empty){
      if(!items||!items.length)return'<p class="text-[12px] text-gray-400">'+empty+'</p>';
      return'<ul class="text-[12px] text-gray-700 leading-relaxed space-y-1 list-disc list-inside">'+items.map(function(s){return'<li>'+esc(s)+'</li>';}).join('')+'</ul>';
    }
    function goodBadHtml(items){
      if(!items||!items.length)return'<p class="text-[12px] text-gray-400">특이사항 없음</p>';
      return'<ul class="text-[12px] text-gray-700 leading-relaxed space-y-1.5">'+items.map(function(g){
        var good=g.sign==='good';
        return'<li class="flex items-start gap-1.5"><i class="ti '+(good?'ti-circle-check text-emerald-500':'ti-alert-circle text-amber-500')+' text-sm mt-0.5 flex-shrink-0"></i><span>'+esc(g.text)+'</span></li>';
      }).join('')+'</ul>';
    }
    var html='';
    if(ins.feature) html+=bucket('ti-chart-bar','blue','주간 현재 특징','<p class="text-[12px] text-gray-700 leading-relaxed">'+esc(ins.feature)+'</p>');
    html+=bucket('ti-list-check','teal','좋은 점 · 문제점',goodBadHtml(ins.goodBad));
    html+=bucket('ti-bulb','purple','원인 후보',listHtml(ins.cause,'특이사항 없음'));
    if(a.trend&&a.trend.length) html+=bucket('ti-speakerphone','rose','커뮤니티 동향',listHtml(a.trend,'특이사항 없음'));
    window._analysisCache='<div class="space-y-2.5">'+(a.period?'<div class="text-[10px] text-gray-400 font-semibold">📅 '+esc(a.period)+'</div>':'')+html+'</div>';
  } else if(d.analysis&&d.analysis.sections&&d.analysis.sections.length){
    var a=d.analysis;
    var iconMap={'트래픽':'ti-chart-line text-blue-500','매출':'ti-coin text-emerald-500','핵심':'ti-alert-circle text-amber-500','통찰':'ti-telescope text-purple-500'};
    var colorMap={'트래픽':'blue','매출':'emerald','핵심':'amber','통찰':'purple'};
    var html=a.sections.map(function(s){
      var icon=iconMap[s.key]||'ti-info-circle text-gray-500';
      var clr=colorMap[s.key]||'gray';
      var labels={'트래픽':'트래픽','매출':'매출','핵심':'핵심 포인트','통찰':'장기 통찰'};
      return'<div class="p-3.5 bg-'+clr+'-50/60 border border-'+clr+'-100 rounded-xl"><div class="flex items-center gap-1.5 mb-1.5"><i class="ti '+icon+' text-sm"></i><span class="font-bold text-xs text-'+clr+'-900">'+(labels[s.key]||s.key)+'</span></div><p class="text-[12px] text-gray-700 leading-relaxed">'+esc(s.summary)+'</p></div>';
    }).join('');
    window._analysisCache='<div class="space-y-2.5">'+(a.period?'<div class="text-[10px] text-gray-400 font-semibold">📅 '+esc(a.period)+'</div>':'')+html+'</div>';
  }
  if(d.competitor) window._competitorCache=d.competitor;
  if(currentPage==='dashboard') renderDashboard();
  if(currentPage==='milestone') renderMilestonePage();
  if(currentPage==='competitor') renderCompetitor();
  // renderDashboard가 DOM을 교체한 뒤에 뱃지 업데이트
  if(window._milestoneCurrentDate){
    var mdEl=document.getElementById('milestone-active-date');
    if(mdEl) mdEl.textContent='최신: '+window._milestoneCurrentDate;
  }
}

function renderCompetitor(){
  var c=document.getElementById('content-area');
  var data=window._competitorCache;

  // 데이터 없으면 안내
  if(!data||!data.games||!data.games.length){
    c.innerHTML='<div class="card"><div class="card-header"><span class="card-title"><i class="ti ti-radar text-violet-500"></i> 경쟁사 모니터링</span></div>'
      +'<div class="text-center py-16 text-gray-400"><i class="ti ti-satellite text-5xl mb-3 block"></i>'
      +'<p class="font-semibold text-sm mb-1">아직 수집된 데이터가 없습니다</p>'
      +'<p class="text-xs">Apps Script에 <b>competitor-monitor.gs</b>를 설치하고<br>'
      +'<code class="bg-gray-100 px-1 rounded">collectCompetitorNews()</code>를 한 번 실행해 주세요.</p></div></div>';
    return;
  }

  var updatedLabel=data.updated?'<span class="text-[10px] text-gray-400 font-medium">최종 수집: '+esc(data.updated.slice(0,16).replace('T',' '))+'</span>':'';

  // 필터 탭
  var allGames=data.games.map(function(g){return g.name;});
  var filterHtml='<div class="flex flex-wrap gap-1.5 mb-4" id="comp-filter">'
    +'<button onclick="compFilter(\'\')" id="comp-f-all" class="comp-tab active text-[11px] font-bold px-3 py-1 rounded-full border bg-violet-600 text-white border-violet-600">전체</button>'
    +allGames.map(function(g){
      return'<button onclick="compFilter(\''+esc(g)+'\')" id="comp-f-'+esc(g)+'" class="comp-tab text-[11px] font-bold px-3 py-1 rounded-full border bg-white text-gray-600 border-gray-300 hover:border-violet-400 hover:text-violet-700 transition-colors">'+esc(g)+'</button>';
    }).join('')+'</div>';

  // 게임 카드들
  var GAME_COLOR={
    '이클립스':'violet','제우스':'blue','나이트크로우':'emerald','리니지W':'amber','검은사막M':'rose'
  };
  function colorOf(name){
    for(var k in GAME_COLOR){if(name.indexOf(k)!==-1)return GAME_COLOR[k];}
    return 'slate';
  }

  var cardsHtml=data.games.map(function(g){
    var clr=colorOf(g.name);
    var articles=g.articles||[];
    var summaryHtml=g.summary?'<div class="mb-3 px-3 py-2.5 bg-'+clr+'-50 border border-'+clr+'-200 rounded-xl text-[12px] text-'+clr+'-900 leading-relaxed"><i class="ti ti-sparkles text-'+clr+'-400 mr-1"></i>'+esc(g.summary)+'</div>':'';
    var artHtml=articles.length?articles.map(function(a,i){
      var dateStr=a.date?'<span class="text-[10px] text-gray-400 flex-shrink-0">'+esc(a.date.slice(0,10))+'</span>':'';
      var sourceStr=a.source?'<span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded flex-shrink-0">'+esc(a.source)+'</span>':'';
      var descStr=a.desc?'<p class="text-[11px] text-gray-500 mt-0.5 leading-relaxed line-clamp-2">'+esc(a.desc)+'</p>':'';
      var linkAttr=a.url?'href="'+esc(a.url)+'" target="_blank" rel="noopener"':'href="#" onclick="return false"';
      return'<li class="py-2.5 '+(i>0?'border-t border-gray-100':'')+'"><a '+linkAttr+' class="group block">'
        +'<div class="flex items-start justify-between gap-2">'
        +'<span class="text-[12px] font-semibold text-gray-800 group-hover:text-'+clr+'-700 leading-snug">'+esc(a.title)+'</span>'
        +'<div class="flex items-center gap-1 flex-shrink-0 mt-0.5">'+sourceStr+dateStr+'</div></div>'
        +descStr+'</a></li>';
    }).join('')
    :'<li class="py-4 text-center text-xs text-gray-400">수집된 기사가 없습니다</li>';

    return'<div class="card comp-game-card" data-game="'+esc(g.name)+'">'
      +'<div class="card-header"><span class="card-title text-sm"><i class="ti ti-device-gamepad-2 text-'+clr+'-500"></i> '+esc(g.name)+'</span>'
      +'<span class="text-[10px] font-bold bg-'+clr+'-50 text-'+clr+'-700 border border-'+clr+'-200 px-2 py-0.5 rounded-full">'+articles.length+'건</span></div>'
      +summaryHtml
      +'<ul>'+artHtml+'</ul></div>';
  }).join('');

  c.innerHTML='<div class="card-header mb-3" style="padding:0"><span class="card-title text-sm"><i class="ti ti-radar text-violet-500"></i> 경쟁사 모니터링</span>'+updatedLabel+'</div>'
    +filterHtml
    +'<div id="comp-cards" class="grid grid-cols-1 lg:grid-cols-2 gap-4">'+cardsHtml+'</div>';
}

function compFilter(name){
  // 탭 active 상태
  document.querySelectorAll('.comp-tab').forEach(function(btn){
    var isAll=(name===''&&btn.id==='comp-f-all');
    var isMatch=(name!==''&&btn.id==='comp-f-'+name);
    if(isAll||isMatch){btn.className=btn.className.replace(/bg-white text-gray-600 border-gray-300/,'').trim()+' bg-violet-600 text-white border-violet-600';}
    else{btn.className=btn.className.replace(/bg-violet-600 text-white border-violet-600/,'').trim()+' bg-white text-gray-600 border-gray-300';}
  });
  // 카드 표시/숨김
  document.querySelectorAll('.comp-game-card').forEach(function(el){
    el.style.display=(name===''||el.dataset.game===name)?'':'none';
  });
}
