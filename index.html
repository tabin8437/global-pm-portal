<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f8f9fa;--bg-tertiary:#f0f1f3;
  --text-primary:#111827;--text-secondary:#6b7280;--text-tertiary:#9ca3af;
  --border:#e5e7eb;--border-strong:#d1d5db;
  --accent:#10b981;--accent-light:#d1fae5;--accent-dark:#065f46;
  --radius:10px;--radius-lg:16px;
  --sidebar-w:250px;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:13px;color:var(--text-primary)}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);background:#fff;outline:none;transition:border .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.12)}
textarea{resize:vertical;min-height:80px;line-height:1.6}

/* ── Login ── */
.login-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#064e3b 0%,#065f46 30%,#047857 60%,#059669 100%);backdrop-filter:blur(20px)}
.login-card{background:#fff;border-radius:20px;padding:48px 40px;width:380px;max-width:90vw;box-shadow:0 25px 60px rgba(0,0,0,.25);text-align:center}
.login-card h1{font-size:22px;font-weight:800;color:#111;margin:16px 0 4px}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:28px}
.login-card .logo-circle{width:56px;height:56px;background:var(--accent);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:4px}
.login-card .logo-circle i{color:#fff;font-size:26px}
.login-input{position:relative;margin-bottom:16px;text-align:left}
.login-input label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.login-input input{padding:10px 14px;font-size:14px;border-radius:12px}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.login-btn:hover{background:#059669}
.login-error{color:#ef4444;font-size:12px;margin-top:10px;min-height:18px;font-weight:600}

/* ── App Shell ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-header .logo{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-header .logo i{color:#fff;font-size:17px}
.sidebar-header .title{font-size:14px;font-weight:700}
.sidebar-header .sub{font-size:10px;color:var(--text-tertiary);margin-top:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-label{padding:16px 18px 4px;font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-left:2.5px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:var(--bg-secondary);color:var(--text-primary)}
.nav-item.active{color:var(--accent-dark);border-left-color:var(--accent);background:var(--accent-light);font-weight:600}
.nav-item i,.nav-item span.icon{font-size:16px;flex-shrink:0;width:18px;text-align:center}
.nav-group-toggle{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:13px;color:var(--text-secondary);cursor:pointer;user-select:none;transition:background .12s}
.nav-group-toggle:hover{background:var(--bg-secondary)}
.nav-group-toggle .chevron{font-size:12px;transition:transform .2s;margin-left:auto}
.nav-group-toggle.open .chevron{transform:rotate(90deg)}
.nav-group-items{overflow:hidden;max-height:0;transition:max-height .25s ease}
.nav-group-items.open{max-height:600px}
.nav-group-items .nav-item{padding-left:36px;font-size:12px}
.admin-only{display:none}
body.is-admin .admin-only{display:flex}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-tertiary)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.breadcrumb{font-size:12px;color:var(--text-tertiary);font-weight:500}
.breadcrumb b{color:var(--text-primary);font-weight:700}
.clock-bar{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--bg-secondary);border:1px solid var(--border);padding:6px 14px;border-radius:12px}
.clock-bar .sep{width:1px;height:14px;background:var(--border);margin:0 6px}
.content{flex:1;overflow-y:auto;padding:24px;min-height:0}
.page{display:none}
.page.active{display:block}

/* ── Cards ── */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}

/* ── KPI Chart Bars ── */
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;transition:box-shadow .15s}
.kpi-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.kpi-label{font-size:11px;font-weight:600;color:var(--text-tertiary)}
.kpi-value{font-size:24px;font-weight:800;color:var(--text-primary);margin:4px 0 2px;letter-spacing:-.5px}
.kpi-change{font-size:11px;font-weight:700}
.kpi-change.up{color:#ef4444}
.kpi-change.down{color:#3b82f6}
.kpi-bar-track{height:6px;background:var(--bg-secondary);border-radius:3px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.kpi-sparkline{display:flex;align-items:flex-end;gap:2px;height:32px;margin-top:8px}
.kpi-sparkline .bar{flex:1;border-radius:2px;transition:height .5s ease;min-width:4px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;font-weight:600;border:1px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;background:#fff;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg-secondary)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#059669}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-ghost{border:none;background:transparent;color:var(--accent-dark)}
.btn-ghost:hover{background:var(--accent-light)}

/* ── Doc Viewer ── */
.doc-viewer{display:flex;flex-direction:column;height:calc(100vh - 61px);margin:-24px;background:#fff}
.doc-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.doc-toolbar .title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.doc-iframe-wrap{flex:1;position:relative;overflow:hidden}
.doc-iframe-wrap iframe{width:100%;height:100%;border:none}
.doc-iframe-wrap .read-overlay{position:absolute;top:0;left:0;right:0;bottom:40px;z-index:10;cursor:default}

/* ── Misc ── */
.row-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.link-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text-primary);font-size:13px;font-weight:600;transition:all .12s}
.link-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(16,185,129,.1);transform:translateY(-1px)}
.link-card i{font-size:18px;flex-shrink:0}
.link-card.featured{background:var(--accent-light);border-color:var(--accent)}
.detail-box{margin-top:8px;background:var(--bg-secondary);padding:10px 12px;border-radius:8px;font-size:12px;white-space:pre-wrap;color:var(--text-secondary);line-height:1.6;max-height:200px;overflow-y:auto}
.preview-btns{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.preview-frame{display:none;margin-top:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;height:420px}
.preview-frame iframe{width:100%;height:100%;border:none}
.tag-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--accent-dark);margin-top:4px;text-decoration:none}
.apple-region-box{background:var(--bg-secondary);border-radius:12px;padding:14px;transition:background .2s}
.apple-region-box .region-label{font-size:11px;font-weight:700;color:var(--text-tertiary);margin-bottom:6px}
.apple-region-box.approved{background:var(--accent-light)}
.apple-region-box.approved .region-label{color:var(--accent-dark)}
.ai-panel{display:flex;flex-direction:column;height:calc(100vh - 61px - 48px);background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin:-24px;margin-top:0}
.ai-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-ai{background:var(--bg-secondary);padding:12px 16px;border-radius:12px;font-size:13px;max-width:80%;align-self:flex-start;line-height:1.6}
.msg-user{background:var(--accent);color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;max-width:80%;align-self:flex-end}
.ai-foot{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.ai-foot input{flex:1}
.user-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-secondary);padding:4px 10px;border-radius:8px;background:var(--bg-secondary);cursor:pointer}
.user-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
</style>
</head>

/* ── User DB (localStorage) ── */
var _memUsers=null;
function getUserDB(){
  if(_memUsers) return _memUsers;
  try{var s=localStorage.getItem('portal_users');if(s){_memUsers=JSON.parse(s);return _memUsers;}}catch(e){}
  _memUsers=[];return _memUsers;
}
function saveUserDB(users){_memUsers=users;try{localStorage.setItem('portal_users',JSON.stringify(users));}catch(e){}}
function seedAdmin(){
  var users=getUserDB();
  var exists=false;
  for(var i=0;i<users.length;i++){if(users[i].email===SEED_ADMIN.email){exists=true;break;}}
  if(!exists){users.push({email:SEED_ADMIN.email,name:SEED_ADMIN.name,role:'admin',status:'approved',created:new Date().toISOString()});saveUserDB(users);}
}

/* ── Google Sign-In callback ── */
function decodeJwt(token){try{var b=token.split('.')[1];return JSON.parse(atob(b.replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}

function onGoogleLogin(response){
  var errEl=document.getElementById('login-error');
  errEl.style.color='';errEl.textContent='';
  var payload=decodeJwt(response.credential);
  if(!payload||!payload.email){errEl.textContent='Google 인증 실패';return;}
  var email=payload.email.toLowerCase();
  var name=payload.name||email;
  var picture=payload.picture||'';
  seedAdmin();
  var users=getUserDB();
  var u=null;
  for(var i=0;i<users.length;i++){if(users[i].email===email){u=users[i];break;}}
  if(!u){
    users.push({email:email,name:name,picture:picture,role:'viewer',status:'pending',created:new Date().toISOString()});
    saveUserDB(users);
    errEl.style.color='#f59e0b';
    errEl.textContent='가입 요청 완료! 관리자 승인 후 이용 가능합니다.';
    return;
  }
  if(u.status!=='approved'){errEl.style.color='#f59e0b';errEl.textContent='관리자 승인 대기 중입니다.';return;}
  u.name=name;u.picture=picture;saveUserDB(users);
  loginSuccess(u.role,u.name,u.picture);
}

/* ── Session ── */
var _sessionAuth=null;
function loginSuccess(role,name,picture){
  isAdmin=(role==='admin');
  _sessionAuth={role:role,name:name||'',picture:picture||'',ts:Date.now()};
  try{sessionStorage.setItem('portal_auth',JSON.stringify(_sessionAuth));}catch(e){}
  if(isAdmin) document.body.classList.add('is-admin');
  var roleLabel=document.getElementById('user-role-label');
  if(roleLabel) roleLabel.textContent=(name||'')+(isAdmin?' (관리자)':' (뷰어)');
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('main-app').style.display='flex';
  initApp();
}
function doLogout(){_sessionAuth=null;try{sessionStorage.removeItem('portal_auth');}catch(e){}location.reload();}
function checkSession(){
  if(_sessionAuth&&_sessionAuth.role){loginSuccess(_sessionAuth.role,_sessionAuth.name,_sessionAuth.picture);return true;}
  try{var s=JSON.parse(sessionStorage.getItem('portal_auth'));if(s&&s.role&&(Date.now()-s.ts)<86400000){loginSuccess(s.role,s.name,s.picture);return true;}}catch(e){}
  return false;
}

  var titles={weekly:'주간회의',report:'보고',internal:'내부 회의',dev:'개발사 미팅'};
  var list=meetings[type]||[];
  var formHtml='<div id="mt-form-'+suffix+'" style="display:none" class="card"><div class="card-header"><span class="card-title">'+titles[type]+' 추가/수정</span></div><div class="form-group"><label>제목</label><input type="text" id="mt-title-'+suffix+'"></div><div class="grid2"><div class="form-group"><label>일자</label><input type="date" id="mt-date-'+suffix+'"></div><div class="form-group"><label>참석자</label><input type="text" id="mt-attendees-'+suffix+'"></div></div><div class="form-group"><label>요약</label><input type="text" id="mt-summary-'+suffix+'"></div>'+(type==='report'?'<div class="form-group"><label>링크</label><input type="text" id="mt-file-'+suffix+'"></div>':'')+'<div class="form-group"><label>상세</label><textarea id="mt-details-'+suffix+'"></textarea></div><div style="display:flex;gap:6px;justify-content:flex-end"><button class="btn btn-sm" onclick="document.getElementById(\'mt-form-'+suffix+'\').style.display=\'none\'">취소</button><button class="btn btn-sm btn-primary" onclick="saveMeeting(\''+type+'\')">저장</button></div></div>';
  var listHtml=list.length?list.map(function(m,i){
    var fileVal=m.file&&m.file.trim();
    var linkBtn=fileVal?'<a href="'+esc(fileVal)+'" target="_blank" class="tag-link"><i class="ti ti-link"></i> 원본 문서</a>':'';
    return'<div class="row-item"><div style="flex:1"><div class="font-bold text-sm text-gray-900">'+esc(m.title)+'</div><div class="text-xs text-gray-500 mt-1">📅 '+esc(m.date)+' · 👥 '+esc(m.attendees||'-')+'</div><div class="text-xs font-semibold text-indigo-700 mt-1">📌 '+esc(m.summary||'-')+'</div>'+linkBtn+(m.details?'<div class="detail-box mt-2">'+esc(m.details)+'</div>':'')+'</div>'+(isAdmin?'<button class="btn btn-sm" onclick="openMeetingForm(\''+type+'\','+i+')">수정</button>':'')+'</div>';
  }).join(''):'<p class="text-sm text-gray-400 py-4 text-center">기록이 없습니다.</p>';
  document.getElementById('content-area').innerHTML=formHtml+'<div class="card"><div class="card-header"><span class="card-title">'+titles[type]+' 목록</span>'+(isAdmin?'<div class="flex gap-2">'+(type==='report'?'<button class="btn btn-sm" style="color:#ef4444;border-color:#ef4444" onclick="if(confirm(\'초기화?\'))resetMeetings()">초기화</button>':'')+'<button class="btn btn-sm btn-primary" onclick="openMeetingForm(\''+type+'\')"><i class="ti ti-plus"></i> 추가</button></div>':'')+'</div>'+listHtml+'</div>';
}
function openMeetingForm(type,idx){
  var suffix=type==='dev'?'dev':type;
  document.getElementById('mt-form-'+suffix).style.display='block';
  if(typeof idx==='number'){
    editTarget={type:type,index:idx};var m=meetings[type][idx];
    document.getElementById('mt-title-'+suffix).value=m.title||'';
    document.getElementById('mt-date-'+suffix).value=m.date||'';
    document.getElementById('mt-attendees-'+suffix).value=m.attendees||'';
    document.getElementById('mt-summary-'+suffix).value=m.summary||'';
    if(document.getElementById('mt-file-'+suffix))document.getElementById('mt-file-'+suffix).value=m.file||'';
    document.getElementById('mt-details-'+suffix).value=m.details||'';
  }else{editTarget={type:type,index:null};['title','date','attendees','summary','details'].forEach(function(f){var el=document.getElementById('mt-'+f+'-'+suffix);if(el)el.value='';});if(document.getElementById('mt-file-'+suffix))document.getElementById('mt-file-'+suffix).value='';}
}
function saveMeeting(type){
  var suffix=type==='dev'?'dev':type;
  var d={title:document.getElementById('mt-title-'+suffix).value,date:document.getElementById('mt-date-'+suffix).value,attendees:document.getElementById('mt-attendees-'+suffix).value,summary:document.getElementById('mt-summary-'+suffix).value,details:document.getElementById('mt-details-'+suffix).value,file:''};
  if(document.getElementById('mt-file-'+suffix))d.file=document.getElementById('mt-file-'+suffix).value;
  if(editTarget.index!==null)meetings[type][editTarget.index]=d;else meetings[type].unshift(d);
  saveMeetingsToStorage();renderArchive(type);
}
function resetMeetings(){localStorage.removeItem('portal_meetings');meetings=loadMeetings();renderArchive('report');}

/* ── AI ── */
function renderAI(){
  document.getElementById('content-area').innerHTML='<div class="ai-panel"><div class="ai-msgs" id="ai-msgs"><div class="msg-ai">해외사업PM 포탈 AI입니다. 무엇을 도와드릴까요?</div></div><div class="ai-foot"><input type="text" id="ai-inp" placeholder="질문을 입력하세요..." onkeydown="if(event.key===\'Enter\')sendAI()"><button class="btn btn-primary" onclick="sendAI()"><i class="ti ti-send"></i></button></div></div>';
}
function sendAI(){var inp=document.getElementById('ai-inp');var q=inp.value.trim();if(!q)return;var msgs=document.getElementById('ai-msgs');msgs.innerHTML+='<div class="msg-user">'+esc(q)+'</div><div class="msg-ai">처리 중입니다...</div>';inp.value='';msgs.scrollTop=msgs.scrollHeight;}

/* ── Admin ── */
function renderAdmin(){
  var users=getUserDB();
  var pending=users.filter(function(u){return u.status==='pending';});
  var approved=users.filter(function(u){return u.status==='approved';});
  var rejected=users.filter(function(u){return u.status==='rejected';});

  var pendingHtml=pending.length?pending.map(function(u,i){
    var idx=users.indexOf(u);
    return'<div class="flex items-center justify-between p-3 bg-amber-50 border border-amber-200 rounded-xl"><div><div class="font-bold text-sm">'+esc(u.name)+'</div><div class="text-xs text-gray-500">'+esc(u.email)+' · '+((u.created||'').slice(0,10))+'</div></div><div class="flex gap-2"><button class="btn btn-sm btn-primary" onclick="approveUser('+idx+')"><i class="ti ti-check"></i> 승인</button><button class="btn btn-sm" style="color:#ef4444;border-color:#ef4444" onclick="rejectUser('+idx+')"><i class="ti ti-x"></i> 거부</button></div></div>';
  }).join(''):'<p class="text-sm text-gray-400 py-3 text-center">대기 중인 요청이 없습니다.</p>';

  var approvedHtml=approved.map(function(u,i){
    var idx=users.indexOf(u);
    return'<div class="flex items-center justify-between p-3 bg-white border rounded-xl"><div><div class="font-bold text-sm">'+esc(u.name)+' <span class="text-xs font-normal text-gray-400">'+(u.role==='admin'?'👑 관리자':'뷰어')+'</span></div><div class="text-xs text-gray-500">'+esc(u.email)+'</div></div><div class="flex gap-2">'+(u.role!=='admin'?'<button class="btn btn-sm" onclick="toggleRole('+idx+')">역할 변경</button><button class="btn btn-sm" style="color:#ef4444" onclick="rejectUser('+idx+')">차단</button>':'<span class="text-xs text-emerald-600 font-bold">최고 관리자</span>')+'</div></div>';
  }).join('');

  document.getElementById('content-area').innerHTML=
    '<div class="card"><div class="card-header"><span class="card-title"><i class="ti ti-user-plus text-amber-500"></i> 가입 승인 대기 ('+pending.length+')</span></div><div class="space-y-2">'+pendingHtml+'</div></div>'+
    '<div class="card"><div class="card-header"><span class="card-title"><i class="ti ti-users text-emerald-600"></i> 승인된 사용자 ('+approved.length+')</span></div><div class="space-y-2">'+approvedHtml+'</div></div>'+
    '<div class="card"><div class="card-header"><span class="card-title"><i class="ti ti-settings-2 text-gray-500"></i> 시스템 정보</span></div><div class="space-y-3"><div class="p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-xs"><b class="text-emerald-800">✅ 관리자 모드 활성</b> — 회의록 편집, 이슈 관리, 사용자 승인 가능</div><div class="p-3 bg-gray-50 border rounded-xl text-xs text-gray-500">세션은 브라우저 탭을 닫으면 만료됩니다.</div></div></div>';
}
function approveUser(idx){var users=getUserDB();if(users[idx]){users[idx].status='approved';saveUserDB(users);renderAdmin();}}
function rejectUser(idx){var users=getUserDB();if(users[idx]&&confirm(esc(users[idx].name)+' 사용자를 차단/거부하시겠습니까?')){users[idx].status='rejected';saveUserDB(users);renderAdmin();}}
function toggleRole(idx){var users=getUserDB();if(users[idx]){users[idx].role=users[idx].role==='admin'?'viewer':'admin';saveUserDB(users);renderAdmin();}}

/* ═══════════════════════════════════════════

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function runClocks(){
  setInterval(function(){
    var now=new Date();
    document.getElementById('clock-kr').textContent=now.toLocaleTimeString('ko-KR');
    document.getElementById('clock-tw').textContent=new Date(now.getTime()-3600000).toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
    document.getElementById('clock-th').textContent=new Date(now.getTime()-7200000).toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
    document.getElementById('clock-us').textContent=new Date(now.getTime()-57600000).toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
  },1000);
}
